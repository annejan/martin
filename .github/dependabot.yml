# Dependabot — keeps dependencies (and the SHA-pinned GitHub Actions) current automatically, so the
# pins in .github/workflows/*.yml stay fresh instead of silently rotting. Updates are grouped to keep
# the PR volume sane for a hobby/demo repo.
#
# (Replaces an earlier config that used `rust-toolchain` as an ecosystem — that isn't a valid
# Dependabot ecosystem, so it was a silent no-op. The Rust *toolchain* is pinned by rust-toolchain.toml
# and isn't something Dependabot tracks; the Rust *crates* are the `cargo` ecosystem below.)
version: 2
updates:
  # The SHA-pinned actions in build.yml + codeql.yml — Dependabot bumps both the SHA and its `# vX`
  # comment. One grouped PR a week for all of them.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      actions:
        patterns: ["*"]
    commit-message:
      prefix: "ci"

  # The Rust crates (root Cargo.toml). Bevy's tree is large, so group all minor+patch bumps into one
  # PR and only raise majors individually (they tend to need code changes). bevy_gaussian_splatting is
  # patched to our own fork branch (a git dep) — we bump it by hand via `cargo update`, not Dependabot.
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      cargo-minor:
        update-types: ["minor", "patch"]
    commit-message:
      prefix: "deps"
