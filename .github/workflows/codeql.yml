# Advanced CodeQL — full control over the analysis so this engine stays clean as it's reused across
# future demos. Replaces GitHub's *default* CodeQL setup (which must be turned OFF in
# Settings → Code security → Code scanning, else the two analyses conflict). Over the default it adds:
#   • the broader `security-and-quality` query suite (security + maintainability)
#   • the real build environment for Rust (system headers + nightly + cache + a `cargo fetch` of the
#     dep sources) so CodeQL resolves as many call targets / types as it can (the default setup's bare
#     extraction scored low — it couldn't see the dependency crates)
#   • a documented false-positive filter (the procedural-PRNG "salt" heuristic — see codeql-config.yml)
#   • a weekly schedule, so new advisories surface even on idle weeks
name: codeql

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "23 4 * * 1" # Mondays 04:23 UTC

permissions:
  contents: read

jobs:
  analyze:
    name: CodeQL (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      security-events: write # upload the SARIF results
      actions: read
      contents: read
    strategy:
      fail-fast: false
      matrix:
        language: [rust, python, actions]

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      # Give the Rust extractor the same headers a real build needs (udev/alsa/wayland/xkbcommon),
      # so it can resolve the crate + its deps instead of bailing on missing system libraries.
      - name: Install Linux deps
        if: matrix.language == 'rust'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libudev-dev libasound2-dev libwayland-dev libxkbcommon-dev

      - name: Install nightly Rust
        if: matrix.language == 'rust'
        uses: dtolnay/rust-toolchain@5b842231ba77f5c045dba54ac5560fed2db780e2 # nightly

      - name: Cache cargo
        if: matrix.language == 'rust'
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      # Fetch the dependency SOURCES so the Rust extractor can resolve calls/types INTO them (Bevy,
      # wgpu, fundsp, the splatting fork, …). Without the deps present the no-build extractor
      # can't see them, and the "calls with a known target" quality metric drops under CodeQL's
      # threshold (the "problems identifying dependencies" warning). build-mode stays `none`.
      - name: Fetch Rust dependencies
        if: matrix.language == 'rust'
        run: cargo fetch --locked

      - name: Initialize CodeQL
        uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        with:
          languages: ${{ matrix.language }}
          build-mode: none # rust/python/actions all use the no-build extractor
          config-file: ./.github/codeql/codeql-config.yml

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        with:
          category: "/language:${{ matrix.language }}"
