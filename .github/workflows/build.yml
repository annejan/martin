name: build

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  reuse:
    name: REUSE compliance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: fsfe/reuse-action@v5

  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # nightly (pinned by rust-toolchain.toml) for the unstable rustfmt.toml options.
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  build:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      # bevy_gaussian_splatting (vendored fork) needs udev + alsa headers on Linux;
      # winit needs wayland/xkbcommon. Windows (DX12) and macOS (Metal) need nothing.
      - name: Install Linux deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libudev-dev libasound2-dev libwayland-dev libxkbcommon-dev

      # Default features require nightly (nightly_generic_alias / GATs);
      # the exact channel is pinned by rust-toolchain.toml.
      - name: Install nightly Rust
        uses: dtolnay/rust-toolchain@nightly

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build (release)
        run: cargo build --release

      - name: Test (pure unit tests — parsers, timeline, effects; no GPU)
        run: cargo test --release

      - name: Report binary size
        shell: bash
        run: ls -lh target/release/martin* 2>/dev/null || true

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: martin-${{ matrix.os }}
          path: |
            target/release/martin
            target/release/martin.exe
          if-no-files-found: ignore

  # The packaged deal: ONE self-contained binary — the "Op de Camping" demo. build.rs
  # (--features bundle) bakes the show's assets into the executable; it self-extracts to a temp dir
  # at startup and plays with no external files and no env vars. We use the CI-SAFE show
  # (op-de-camping-ci.show): repo-tracked licence-cleared meshes (the Ægg/deFEEST/bitterbal/bornhack)
  # + procedural splats generated fresh here — so it builds straight from a clean checkout.
  bundle:
    name: single binary (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libudev-dev libasound2-dev libwayland-dev libxkbcommon-dev

      - name: Install nightly Rust
        uses: dtolnay/rust-toolchain@nightly

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      # The show's procedural splats (galaxy/supershape/knot/…) aren't in the repo (.ply is gitignored)
      # — generate them fresh so build.rs can bake them in. The character captures (dog/Martins) are
      # NOT used by the CI-safe show; only repo-tracked meshes + these generated shapes.
      - name: Generate procedural splats
        shell: bash
        run: python3 pipeline/gen-demo-splats.py assets

      - name: Build single binary (the Op de Camping demo, --features bundle)
        shell: bash
        run: MARTIN_BUNDLE=bundle-camping.toml cargo build --release --features bundle

      - name: Report binary size
        shell: bash
        run: ls -lh target/release/martin* 2>/dev/null || true

      - name: Upload single binary
        uses: actions/upload-artifact@v4
        with:
          name: op-de-camping-${{ matrix.os }}
          path: |
            target/release/martin
            target/release/martin.exe
          if-no-files-found: ignore
