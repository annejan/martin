name: build

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  reuse:
    name: REUSE compliance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: fsfe/reuse-action@676e2d560c9a403aa252096d99fcab3e1132b0f5 # v6.0.0

  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      # nightly (pinned by rust-toolchain.toml) for the unstable rustfmt.toml options.
      - uses: dtolnay/rust-toolchain@5b842231ba77f5c045dba54ac5560fed2db780e2 # nightly
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Install Linux deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libudev-dev libasound2-dev libwayland-dev libxkbcommon-dev
      - uses: dtolnay/rust-toolchain@5b842231ba77f5c045dba54ac5560fed2db780e2 # nightly
        with:
          components: clippy
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      # Default features (the bundle feature's build.rs needs gitignored .ply assets, not present on a
      # clean checkout). -D warnings so a new lint can't slip in — the few intentional ones are #[allow]ed.
      - run: cargo clippy --all-targets -- -D warnings

  # RustSec advisory scan of the (committed) Cargo.lock — surfaces CVEs in the 25+ transitive Bevy
  # deps. Not a required check (advisories in deps we don't control shouldn't block a merge), but it
  # annotates + flags them so they're visible.
  audit:
    name: cargo-audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      checks: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: rustsec/audit-check@69366f33c96575abad1ee0dba8212993eecbe998 # v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  build:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      # bevy_gaussian_splatting (our fork) needs udev + alsa headers on Linux;
      # winit needs wayland/xkbcommon. Windows (DX12) and macOS (Metal) need nothing.
      - name: Install Linux deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libudev-dev libasound2-dev libwayland-dev libxkbcommon-dev

      # Default features require nightly (nightly_generic_alias / GATs);
      # the exact channel is pinned by rust-toolchain.toml.
      - name: Install nightly Rust
        uses: dtolnay/rust-toolchain@5b842231ba77f5c045dba54ac5560fed2db780e2 # nightly

      - name: Cache cargo
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Build (release)
        run: cargo build --release

      - name: Test (pure unit tests — parsers, timeline, effects; no GPU)
        run: cargo test --release

      - name: Report binary size
        shell: bash
        run: ls -lh target/release/martin* 2>/dev/null || true

      - name: Upload binary
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: martin-${{ matrix.os }}
          path: |
            target/release/martin
            target/release/martin.exe
          if-no-files-found: ignore

  # The packaged deal: ONE self-contained binary — the INTRO production (productions/intro/), the
  # small always-buildable engine showcase with its own simple track. build.rs (--features bundle)
  # bakes the show's assets into the executable; it self-extracts to a temp dir at startup and plays
  # with no external files and no env vars. Built only from repo-tracked licence-cleared assets +
  # procedural splats generated fresh here — straight from a clean checkout. (The camping demo's
  # bundle is full-fat/local-only — its captures can't ship in a clean checkout.)
  bundle:
    name: single binary (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install Linux deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libudev-dev libasound2-dev libwayland-dev libxkbcommon-dev

      - name: Install nightly Rust
        uses: dtolnay/rust-toolchain@5b842231ba77f5c045dba54ac5560fed2db780e2 # nightly

      - name: Cache cargo
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      # Consistent `python` across Linux/Windows/macOS runners (Windows has no `python3`).
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.x"

      # The show's procedural splats (galaxy/supershape/knot/helix/…) aren't in the repo (.ply is
      # gitignored) — generate them fresh so build.rs can bake them in. (numpy isn't preinstalled
      # on the runners.)
      - name: Generate procedural splats
        shell: bash
        run: |
          python -m pip install --quiet numpy
          python pipeline/gen-demo-splats.py assets

      # Pre-render the track to a WAV and bake it into the bundle, so the demo plays the music
      # INSTANTLY + in sync (the live synth render takes ~30s — too slow for a one-click demo).
      - name: Render the music
        shell: bash
        env:
          MARTIN_SYNTH_WAV: productions/intro/intro.wav
          MARTIN_SCORE: productions/intro/score.txt
          MARTIN_SCORE_STRICT: "1" # fail the build on any score lint warning (phase/bar mismatch, …)
        run: cargo run --release   # the MARTIN_SYNTH_WAV path renders the WAV and exits (no window)

      - name: Build single binary (the intro production, --features bundle)
        shell: bash
        run: MARTIN_BUNDLE=productions/intro/bundle.toml cargo build --release --features bundle

      - name: Report binary size
        shell: bash
        run: ls -lh target/release/martin* 2>/dev/null || true

      - name: Upload single binary
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: martin-intro-${{ matrix.os }}
          path: |
            target/release/martin
            target/release/martin.exe
          if-no-files-found: ignore
