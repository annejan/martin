# productions/camping/bundle.toml — the "Op de Camping" demo as ONE self-contained executable.
# FULL-FAT and LOCAL-ONLY: the show uses the big gitignored captures (Ægg / dog / Martin), so this
# bundle builds on a machine that has them — NOT on CI (CI builds productions/intro/ instead).
#
#   MARTIN_SYNTH_WAV=assets/op-de-camping.wav cargo run --release    # pre-render the track first
#   MARTIN_BUNDLE=productions/camping/bundle.toml cargo build --release --features bundle
#   ./target/release/martin            # plays the whole demo, no external files, no env vars
#
# build.rs auto-collects every asset the show references, lz4-compresses them into the binary;
# src/bundle.rs self-extracts to a temp dir at startup and runs it.

show = "productions/camping/camping.show"   # the full splat demo (seq + 3D camera)
score = "productions/camping/score.txt" # the Op de Camping arrangement (this production owns it)
logo = "defeest-logo.png"            # the loader screen while it decompresses
music = "assets/op-de-camping.wav"     # pre-rendered track baked in (render it first — see above; gitignored)
