[[annotations]]
path = ["assets/*.seq", "assets/*.txt", "assets/*.json", "assets/*.compose", "assets/*.show", "assets/examples/*.show", "assets/*.wgsl"]
SPDX-FileCopyrightText = "2026 Anne Jan Brouwer <brouwer@annejan.com>"
SPDX-License-Identifier = "MIT"

# assets/score.txt is the music arrangement in the tracker DSL. Its melody + chords are a heavily
# derived transcription of "Op de Camping" (Ome Henk, 1995) — itself a parody/cover of "In the Navy"
# (Village People, 1979) — so both source works are credited alongside the arrangement.
[[annotations]]
path = "assets/score.txt"
precedence = "override"
SPDX-FileCopyrightText = [
    "2026 Anne Jan Brouwer <brouwer@annejan.com>",
    "1995 Ome Henk — Op de Camping",
    "1979 Village People — In the Navy",
]
SPDX-License-Identifier = "MIT"

# op-de-camping.mid is the score exported to MIDI (pipeline/score_to_midi.py) to share with
# composers/arrangers — same derivation + source credits as the score it came from.
[[annotations]]
path = "op-de-camping.mid"
SPDX-FileCopyrightText = [
    "2026 Anne Jan Brouwer <brouwer@annejan.com>",
    "1995 Ome Henk — Op de Camping",
    "1979 Village People — In the Navy",
]
SPDX-License-Identifier = "MIT"

[[annotations]]
