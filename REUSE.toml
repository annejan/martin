version = 1

[[annotations]]
path = "src/**"
SPDX-FileCopyrightText = "2026 Anne Jan Brouwer <brouwer@annejan.com>"
SPDX-License-Identifier = "MIT"

# Synth + music clock ported (with edits) from Cinder's term-demo (MIT) — keep his copyright.
[[annotations]]
path = ["src/audio.rs", "src/score.rs"]
precedence = "override"
SPDX-FileCopyrightText = [
    "2026 Kristian Vlaardingerbroek",
    "2026 Anne Jan Brouwer <brouwer@annejan.com>",
]
SPDX-License-Identifier = "MIT"

[[annotations]]
path = [
    "Cargo.toml",
    "Cargo.lock",
    "rust-toolchain.toml",
    "rustfmt.toml",
    "USAGE.md",
]
SPDX-FileCopyrightText = "2026 Anne Jan Brouwer <brouwer@annejan.com>"
SPDX-License-Identifier = "MIT"

[[annotations]]
path = "assets/*.ply"
precedence = "override"
SPDX-FileCopyrightText = "2026 Anne Jan Brouwer <brouwer@annejan.com>"
SPDX-License-Identifier = "MIT"

[[annotations]]
path = ["assets/*.seq", "assets/*.txt", "assets/*.json", "assets/*.compose"]
SPDX-FileCopyrightText = "2026 Anne Jan Brouwer <brouwer@annejan.com>"
SPDX-License-Identifier = "MIT"

# score.txt is the music's composition (Cinder's), exported to the tracker DSL — mirror score.rs.
[[annotations]]
path = "assets/score.txt"
precedence = "override"
SPDX-FileCopyrightText = [
    "2026 Kristian Vlaardingerbroek",
    "2026 Anne Jan Brouwer <brouwer@annejan.com>",
]
SPDX-License-Identifier = "MIT"

[[annotations]]
path = "assets/font.ttf"
SPDX-FileCopyrightText = "2003 Bitstream, Inc."
SPDX-License-Identifier = "LicenseRef-DejaVu"

[[annotations]]
path = "assets/relief-singleline.ttf"
SPDX-FileCopyrightText = "2022 The Relief SingleLine Project Authors"
SPDX-License-Identifier = "OFL-1.1"

[[annotations]]
path = "vendor/**"
precedence = "aggregate"
SPDX-FileCopyrightText = "2026 bevy_gaussian_splatting contributors"
SPDX-License-Identifier = "MIT OR Apache-2.0"

[[annotations]]
path = [
    "README.md",
    "ART-DIRECTION.md",
    "DESIGN.md",
    "SHADER-BLUEPRINT.md",
    "record.sh",
    "pipeline/splat-setup.sh",
    "pipeline/splat.sh",
    ".gitignore",
    ".github/dependabot.yml",
    ".github/workflows/build.yml",
]
SPDX-FileCopyrightText = "2026 Anne Jan Brouwer <brouwer@annejan.com>"
SPDX-License-Identifier = "MIT"
